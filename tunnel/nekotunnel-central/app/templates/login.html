{% extends 'base.html' %}
{% block content %}
<div class="login-body">
    <main class="login-card panel">
        <div class="logo-mark" style="width: 42px; height: 42px; background: var(--accent-glass); color: var(--accent-color); display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: bold; margin-bottom: 20px; font-size: 16px;">NT</div>
        <h1 style="font-size: 24px; margin-bottom: 8px;">NekoTunnel Central</h1>
        <p class="muted" style="margin-bottom: 20px;">Admin token login</p>
        {% for flash in flashes %}
          <div class="alert alert-{{ flash.category }}">{{ flash.message }}</div>
        {% endfor %}
        <form method="post" action="/login" class="stack">
          <label for="admin_token">Admin Token</label>
          <input id="admin_token" name="admin_token" type="password" placeholder="Enter ADMIN_TOKEN" required autofocus>
          <button class="primary" type="submit" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
    </main>
</div>
<script>
    // Hide topbar and sidebar on login page
    document.addEventListener("DOMContentLoaded", function() {
        const topbar = document.querySelector('.topbar');
        const sidebar = document.querySelector('.sidebar');
        if (topbar) topbar.style.display = 'none';
        if (sidebar) sidebar.style.display = 'none';
    });
</script>
{% endblock %}
