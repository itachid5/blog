{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <h1>Logs</h1>
  <p class="muted">SQLite audit log for local admin and provisioning actions.</p>
</section>
<div class="panel">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>
      <tbody>
      {% for log in logs %}
        <tr>
          <td>{{ log.created_at }}</td>
          <td>{{ log.actor }}</td>
          <td><code>{{ log.action }}</code></td>
          <td>{{ log.details }}</td>
        </tr>
      {% else %}
        <tr><td colspan="4" class="empty">No logs yet.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
