<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NekoTunnel Central</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           গ্লোবাল টাচ হাইলাইট ও আউটলাইন ফিক্স 
           ========================================= */
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }
        *:focus { outline: none !important; }

        /* =========================================
           থিম ভেরিয়বলস (নিউট্রাল কালার আপডেট)
           ========================================= */
        :root[data-theme="dark"] {
            --bg-body: #000000; 
            --glass-bg: rgba(15, 15, 15, 0.65); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #e0e0e6; 
            --text-secondary: #9ca3af; 
            --hover-bg: rgba(255, 255, 255, 0.08);
            
            --menu-active-bg: rgba(255, 255, 255, 0.12); 
            --menu-active-text: #ffffff;
            
            --accent-color: #e0e0e6;
            --accent-glass: rgba(255, 255, 255, 0.12);
            
            --card-bg: rgba(20, 20, 20, 0.4);
            --input-bg: rgba(20, 20, 20, 0.6);
            --code-bg: rgba(255, 255, 255, 0.05);
            
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
        }

        :root[data-theme="light"] {
            --bg-body: #f4f5f7; 
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-primary: #111827;
            --text-secondary: #4b5563; 
            --hover-bg: rgba(0, 0, 0, 0.05);
            
            --menu-active-bg: rgba(0, 0, 0, 0.06);
            --menu-active-text: #111827;
            
            --accent-color: #111827;
            --accent-glass: rgba(0, 0, 0, 0.06);
            
            --card-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.7);
            --code-bg: rgba(0, 0, 0, 0.04);
            
            --color-success: #16a34a;
            --color-warning: #d97706;
            --color-danger: #dc2626;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300; 
            font-size: 14px; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        a { color: inherit; text-decoration: none; }
        code, pre { max-width: 100%; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; font-family: monospace; }
        code { border-radius: 6px; background: var(--code-bg); padding: 2px 6px; font-size: 12px; }
        pre { margin: 0; border: 1px solid var(--glass-border); border-radius: 12px; background: var(--code-bg); padding: 14px; overflow-x: auto; }
        
        /* Buttons / Inputs */
        button, .button-link { 
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            background: var(--card-bg); 
            color: var(--text-primary); 
            min-height: 36px; 
            padding: 8px 14px; 
            font: inherit; 
            font-weight: 500; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            transition: all 0.2s ease;
        }
        button:hover, .button-link:hover { background-color: var(--hover-bg); }
        button:active, .button-link:active { transform: scale(0.98); }
        button.primary, .primary { 
            background: var(--text-primary); 
            color: var(--bg-body); 
            border-color: transparent; 
        }
        button.primary:hover { opacity: 0.9; }
        button.danger, .danger { color: var(--color-danger); border-color: rgba(239, 68, 68, 0.3); }
        button.danger:hover { background: rgba(239, 68, 68, 0.1); }
        
        input, select, textarea { 
            width: 100%; 
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            background: var(--input-bg); 
            color: var(--text-primary); 
            padding: 10px 12px; 
            font: inherit; 
            transition: border-color 0.2s ease;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--text-secondary); }
        label { display: grid; gap: 6px; color: var(--text-secondary); font-size: 12px; font-weight: 500; letter-spacing: 0.2px; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        /* Topbar */
        .topbar {
            padding: 10px 20px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; }

        .icon-btn {
            background: transparent; border: none; color: var(--text-secondary);
            cursor: pointer; padding: 6px; 
            border-radius: 8px; display: flex; align-items: center; 
            transition: all 0.2s ease; user-select: none;
            min-height: auto;
        }
        .icon-btn.menu-btn { margin-right: 12px; }
        @media (hover: hover) { .icon-btn:hover { background-color: var(--hover-bg); color: var(--text-primary); } }
        .icon-btn:active { transform: scale(0.90); background-color: transparent !important; }

        .topbar h1 { margin: 0; font-size: 15px; font-weight: 400; letter-spacing: 0.2px; }
        .sun-icon { display: none; }
        .moon-icon { display: block; }
        :root[data-theme="light"] .sun-icon { display: block; }
        :root[data-theme="light"] .moon-icon { display: none; }

        /* Main Content */
        .main-content {
            padding: 25px 20px; max-width: 1100px; margin: 0 auto; padding-bottom: 100px;
        }
        .main-content h2, .page-head h1 { 
            font-weight: 400; font-size: 20px; margin-top: 0; margin-bottom: 15px; letter-spacing: -0.5px; 
        }
        .page-head { margin-bottom: 25px; }
        .muted { color: var(--text-secondary); }
        .small { font-size: 12px; }

        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; } }
        @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

        .stat-card, .panel { 
            padding: 15px 18px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: var(--card-bg); 
            margin-bottom: 20px;
        }
        .stat-card { display: flex; flex-direction: column; margin-bottom: 0; }
        .stat-card.full-width { grid-column: span 2; }
        @media (min-width: 768px) { .stat-card.full-width { grid-column: span 1; } }

        .stat-card-header { 
            display: flex; justify-content: space-between; align-items: center; 
            color: var(--text-secondary); font-size: 11px; font-weight: 500; 
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .stat-card h3 { 
            margin: 0; font-size: 24px; font-weight: 300; 
            color: var(--text-primary); letter-spacing: -0.5px; 
        }

        /* Sidebar */
        .sidebar {
            width: 250px; height: 100vh; position: fixed; top: 0; left: 0;
            padding-top: 15px; border-right: 1px solid var(--glass-border); 
            z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow-y: auto;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 20px; }
        .sidebar-logo { font-weight: 400; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-primary); }
        .section-title { font-size: 10px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; margin: 15px 0 8px 15px; text-transform: uppercase; }
        
        .menu-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 15px;
            margin: 0 8px 4px 8px; cursor: pointer; border-radius: 8px;
            color: var(--text-secondary); font-size: 14px; font-weight: 400;
            transition: all 0.2s ease; user-select: none; text-decoration: none;
        }
        button.menu-item {
            width: calc(100% - 16px); border: none; background: transparent; font-family: inherit;
        }
        @media (hover: hover) { .menu-item:hover { background-color: var(--hover-bg); color: var(--text-primary); } }
        .menu-item:active { transform: scale(0.98); }
        .menu-item.active { background-color: var(--menu-active-bg); color: var(--menu-active-text); font-weight: 500; }
        .menu-item.logout:hover { color: var(--color-danger); background-color: rgba(239, 68, 68, 0.1); }
        .lucide { width: 16px; height: 16px; } 

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 900; visibility: hidden; opacity: 0; transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        :root[data-theme="light"] .overlay { background: rgba(255, 255, 255, 0.3); }
        .overlay.show { visibility: visible; opacity: 1; }

        /* Forms / Misc from other pages */
        .grid-form { display: grid; grid-template-columns: repeat(1, 1fr); gap: 14px; align-items: end; }
        @media (min-width: 768px) { .grid-form { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid-form { grid-template-columns: repeat(3, 1fr); } }
        .stack { display: grid; gap: 14px; }
        .inline-form { display: flex; flex-wrap: wrap; align-items: end; gap: 10px; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        
        .alert { margin: 0 0 15px 0; border: 1px solid var(--glass-border); border-radius: 8px; background: var(--card-bg); padding: 12px 14px; font-weight: 500;}
        .alert-warning { border-color: rgba(245, 158, 11, 0.3); color: var(--color-warning); }
        .alert-danger { border-color: rgba(239, 68, 68, 0.3); color: var(--color-danger); }
        .alert-success { border-color: rgba(34, 197, 94, 0.3); color: var(--color-success); }
        
        .badge { display: inline-flex; align-items: center; border: 1px solid var(--glass-border); border-radius: 999px; background: var(--card-bg); padding: 3px 8px; font-size: 11px; font-weight: 500; }
        .status-success, .status-valid, .status-free, .status-deployed, .status-active { color: var(--color-success); border-color: rgba(34, 197, 94, 0.2); }
        .status-failed, .status-invalid, .status-offline, .status-expired, .status-closed { color: var(--color-danger); border-color: rgba(239, 68, 68, 0.2); }
        .status-busy, .status-tcp_pending, .status-pending { color: var(--color-warning); border-color: rgba(245, 158, 11, 0.2); }

        .settings-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 12px; }
        @media (min-width: 768px) { .settings-grid { grid-template-columns: repeat(2, 1fr); } }
        .settings-grid > div { border: 1px solid var(--glass-border); border-radius: 8px; background: var(--input-bg); padding: 12px; }
        .settings-grid span { display: block; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        
        .account-mini-panel, .browserless-box, .command-card { padding: 12px; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--glass-border); margin: 10px 0; }
        
        /* Tables */
        .table-scroll { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { border-bottom: 1px solid var(--glass-border); padding: 12px; vertical-align: top; }
        th { color: var(--text-secondary); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .empty { color: var(--text-secondary); text-align: center; padding: 30px; }
        
        .mobile-only { display: none; }
        @media (max-width: 768px) {
            .mobile-only { display: block; }
            .table-scroll { overflow-x: visible; }
            .responsive-table thead { display: none; }
            .responsive-table, .responsive-table tbody, .responsive-table tr, .responsive-table td { display: block; width: 100%; }
            .responsive-table tr { margin-bottom: 15px; border: 1px solid var(--glass-border); border-radius: 12px; background: var(--card-bg); padding: 15px; }
            .responsive-table td { border-bottom: 1px solid var(--glass-border); padding: 10px 0; }
            .responsive-table td:last-child { border-bottom: 0; }
            .responsive-table td::before { content: attr(data-label); display: block; margin-bottom: 5px; color: var(--text-secondary); font-size: 11px; font-weight: 500; text-transform: uppercase; }
            .actions, .inline-form, .actions form, .actions button, .inline-form button { flex-direction: column; align-items: stretch; width: 100%; }
            .inline-form { margin-bottom: 10px; }
        }
        
        .login-body { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
        .login-card { max-width: 400px; width: 100%; }

        /* Ensure forms without classes don't break layout */
        form { margin-bottom: 0; }
        
        details summary { cursor: pointer; color: var(--accent-color); font-weight: 500; margin-bottom: 10px; }
    </style>
    <script>
        (function () {
            const storedTheme = localStorage.getItem('nekotunnel-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', storedTheme);
        })();
    </script>
</head>
<body>

    <div class="topbar glass-panel">
        <div class="topbar-left">
            <button class="icon-btn menu-btn" id="openMenuBtn">
                <i data-lucide="menu"></i>
            </button>
            <h1>ap.tunnel.theorbit.tech/console</h1>
        </div>
        <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
            <i data-lucide="sun" class="sun-icon"></i>
            <i data-lucide="moon" class="moon-icon"></i>
        </button>
    </div>

    <div class="overlay" id="sidebarOverlay"></div>

    <div class="sidebar glass-panel" id="sidebarMenu">
        <div class="sidebar-header">
            <div class="sidebar-logo">Console</div>
            <button class="icon-btn" id="closeMenuBtn">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="section-title">Operations</div>
        <a href="/" class="menu-item {% if request.path == '/' %}active{% endif %}">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
        </a>
        <a href="/railway-accounts" class="menu-item {% if request.path.startswith('/railway-accounts') %}active{% endif %}">
            <i data-lucide="server"></i>
            <span>Railway Accounts</span>
        </a>
        <a href="/railway-billing" class="menu-item {% if request.path.startswith('/railway-billing') %}active{% endif %}">
            <i data-lucide="receipt"></i>
            <span>Railway Billing</span>
        </a>
        <a href="/projects" class="menu-item {% if request.path.startswith('/projects') %}active{% endif %}">
            <i data-lucide="boxes"></i>
            <span>Projects</span>
        </a>
        <a href="/slots" class="menu-item {% if request.path.startswith('/slots') %}active{% endif %}">
            <i data-lucide="layout-grid"></i>
            <span>Slots</span>
        </a>

        <div class="section-title">Access</div>
        <a href="/users" class="menu-item {% if request.path.startswith('/users') %}active{% endif %}">
            <i data-lucide="users"></i>
            <span>Users</span>
        </a>
        <a href="/sessions" class="menu-item {% if request.path.startswith('/sessions') %}active{% endif %}">
            <i data-lucide="activity"></i>
            <span>Sessions</span>
        </a>

        <div class="section-title">Observability</div>
        <a href="/logs" class="menu-item {% if request.path.startswith('/logs') %}active{% endif %}">
            <i data-lucide="terminal-square"></i>
            <span>Logs</span>
        </a>
        <a href="/provision-logs" class="menu-item {% if request.path.startswith('/provision-logs') %}active{% endif %}">
            <i data-lucide="clipboard-list"></i>
            <span>Provision Logs</span>
        </a>

        <div class="section-title">System</div>
        <a href="/settings" class="menu-item {% if request.path.startswith('/settings') %}active{% endif %}">
            <i data-lucide="settings"></i>
            <span>Settings</span>
        </a>
        <form method="post" action="/logout" style="margin: 0;">
            <button type="submit" class="menu-item logout" style="margin-bottom: 20px;">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>

    {% block content %}{% endblock %}

    <script>
        lucide.createIcons();

        const sidebarMenu = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');
        
        document.getElementById('openMenuBtn').onclick = () => { 
            sidebarMenu.classList.add('open'); 
            overlay.classList.add('show'); 
        };
        
        document.getElementById('closeMenuBtn').onclick = () => { 
            sidebarMenu.classList.remove('open'); 
            overlay.classList.remove('show'); 
        };
        
        overlay.onclick = () => { 
            sidebarMenu.classList.remove('open'); 
            overlay.classList.remove('show'); 
        };

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        themeToggleBtn.onclick = () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('nekotunnel-theme', nextTheme);
        };

        // Fallback copy function
        function copyWithTextareaFallback(text) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          try { document.execCommand('copy'); } catch(e) {}
          document.body.removeChild(textarea);
        }

        function copyLiteralText(text) {
          if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text).catch(function () { copyWithTextareaFallback(text); });
          }
          copyWithTextareaFallback(text);
          return Promise.resolve();
        }

        function bindCopyButtons() {
          document.querySelectorAll('[data-copy-target]').forEach(function (button) {
            button.addEventListener('click', function () {
              const originalText = button.textContent;
              const target = document.getElementById(button.dataset.copyTarget);
              if (target) {
                  copyLiteralText(target.innerText.trim()).then(function () {
                    button.textContent = 'Copied';
                    window.setTimeout(function () { button.textContent = originalText; }, 1500);
                  });
              }
            });
          });
        }
        
        document.addEventListener('DOMContentLoaded', bindCopyButtons);
    </script>
</body>
</html>
